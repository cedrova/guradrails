<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardrails — Dashboard</title>
  <style>
    /* Same base styles as demo.html */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0d1117; color: #e6edf3; min-height: 100vh;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px; border-bottom: 1px solid #21262d;
      background: #161b22;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .live-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 12px;
      background: #3fb95026; color: #3fb950; border: 1px solid #3fb95066;
    }
    .refresh-info { margin-left: auto; font-size: 12px; color: #484f58; }
    main { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #161b22; border: 1px solid #21262d;
      border-radius: 8px; padding: 20px;
    }
    .stat-card .label { font-size: 13px; color: #8b949e; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .value.red    { color: #f85149; }
    .stat-card .value.yellow { color: #d29922; }
    table {
      width: 100%; border-collapse: collapse;
      background: #161b22; border: 1px solid #21262d; border-radius: 8px;
      overflow: hidden;
    }
    th {
      text-align: left; padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      font-size: 12px; font-weight: 600;
      color: #8b949e; text-transform: uppercase; letter-spacing: 0.04em;
    }
    td { padding: 12px 16px; border-bottom: 1px solid #21262d; font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }
    .hash { font-family: monospace; font-size: 13px; color: #79c0ff; }
    .badge {
      display: inline-block; font-size: 11px; padding: 2px 8px;
      border-radius: 12px; font-weight: 600; text-transform: uppercase;
    }
    .badge.pass   { background: #3fb95026; color: #3fb950; border: 1px solid #3fb95066; }
    .badge.fail   { background: #f8514926; color: #f85149; border: 1px solid #f8514966; }
    .badge.bypass { background: #d2992226; color: #d29922; border: 1px solid #d2992266; }
    .skeleton {
      background: linear-gradient(90deg, #21262d 25%, #30363d 50%, #21262d 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
      border-radius: 4px; height: 16px; width: 80%;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .error-banner {
      padding: 16px; background: #f8514926;
      border: 1px solid #f8514966; border-radius: 8px;
      color: #f85149; margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🛡️ Guardrails</h1>
    <span class="live-badge">Live</span>
    <span class="refresh-info" id="refresh-info">Refreshes every 30s</span>
  </header>
  <main>
    <div id="error-area"></div>
    <div class="stats">
      <div class="stat-card">
        <div class="label">Total Commits</div>
        <div class="value" id="stat-total"><div class="skeleton"></div></div>
      </div>
      <div class="stat-card">
        <div class="label">Total Violations</div>
        <div class="value red" id="stat-violations"><div class="skeleton"></div></div>
      </div>
      <div class="stat-card">
        <div class="label">Bypass Rate</div>
        <div class="value yellow" id="stat-bypass"><div class="skeleton"></div></div>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Session</th>
          <th>Author</th>
          <th>Time</th>
          <th>Status</th>
          <th>Violations</th>
        </tr>
      </thead>
      <tbody id="commits-body">
        <tr><td colspan="5"><div class="skeleton"></div></td></tr>
        <tr><td colspan="5"><div class="skeleton" style="width:60%"></div></td></tr>
        <tr><td colspan="5"><div class="skeleton" style="width:75%"></div></td></tr>
      </tbody>
    </table>
  </main>
  <script>
    // Auth: key comes from ?key= query param
    const params = new URLSearchParams(window.location.search);
    const KEY    = params.get('key') || '';
    const HEADERS = {
      'Content-Type': 'application/json',
      ...(KEY ? { 'Authorization': `Bearer ${KEY}` } : {}),
    };

    function showError(msg) {
      document.getElementById('error-area').innerHTML =
        `<div class="error-banner">${msg}</div>`;
    }

    function fmt(ts) {
      const d = new Date(ts);
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function renderRow(session) {
      const shortId = session.id?.slice(0, 8) || '—';
      const vcnt = session.violation_count || 0;
      const status = session.bypassed ? 'bypass'
                   : session.result === 'fail' ? 'fail'
                   : 'pass';
      return `<tr>
        <td><span class="hash">${shortId}</span></td>
        <td>${session.author || '—'}</td>
        <td>${fmt(session.timestamp)}</td>
        <td><span class="badge ${status}">${status}</span></td>
        <td>${vcnt > 0 ? vcnt + ' violation' + (vcnt > 1 ? 's' : '') : '<span style="color:#484f58">—</span>'}</td>
      </tr>`;
    }

    async function load() {
      try {
        const [statsRes, commitsRes] = await Promise.all([
          fetch('/api/stats',          { headers: HEADERS }),
          fetch('/api/commits?limit=50', { headers: HEADERS }),
        ]);

        if (statsRes.status === 401) {
          showError('Unauthorized — provide <code>?key=YOUR_DASHBOARD_KEY</code> in the URL');
          return;
        }

        document.getElementById('error-area').innerHTML = '';

        const stats   = await statsRes.json();
        const commits = await commitsRes.json();

        const bypassRate = stats.total > 0
          ? ((stats.bypassed / stats.total) * 100).toFixed(1) + '%'
          : '0%';

        document.getElementById('stat-total').textContent      = stats.total;
        document.getElementById('stat-violations').textContent  = stats.violations;
        document.getElementById('stat-bypass').textContent      = bypassRate;

        document.getElementById('commits-body').innerHTML =
          commits.length > 0
            ? commits.map(renderRow).join('')
            : '<tr><td colspan="5" style="text-align:center;color:#484f58;padding:32px">No commits recorded yet.</td></tr>';

        const now = new Date().toLocaleTimeString();
        document.getElementById('refresh-info').textContent = `Last updated: ${now}`;

      } catch (e) {
        showError(`Failed to load data: ${e.message}`);
      }
    }

    // Initial load + auto-refresh every 30 seconds
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
