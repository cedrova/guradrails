<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardrails — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0d1117; color: #e6edf3; min-height: 100vh;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px; border-bottom: 1px solid #21262d;
      background: #161b22;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .demo-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 12px;
      background: #388bfd26; color: #388bfd; border: 1px solid #388bfd66;
    }
    main { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #161b22; border: 1px solid #21262d;
      border-radius: 8px; padding: 20px;
    }
    .stat-card .label { font-size: 13px; color: #8b949e; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .value.green { color: #3fb950; }
    .stat-card .value.red   { color: #f85149; }
    .stat-card .value.yellow{ color: #d29922; }
    table {
      width: 100%; border-collapse: collapse;
      background: #161b22; border: 1px solid #21262d; border-radius: 8px;
      overflow: hidden;
    }
    th {
      text-align: left; padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      font-size: 12px; font-weight: 600;
      color: #8b949e; text-transform: uppercase; letter-spacing: 0.04em;
    }
    td { padding: 12px 16px; border-bottom: 1px solid #21262d; font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }
    .hash { font-family: monospace; font-size: 13px; color: #79c0ff; }
    .badge {
      display: inline-block; font-size: 11px; padding: 2px 8px;
      border-radius: 12px; font-weight: 600; text-transform: uppercase;
    }
    .badge.pass   { background: #3fb95026; color: #3fb950; border: 1px solid #3fb95066; }
    .badge.fail   { background: #f8514926; color: #f85149; border: 1px solid #f8514966; }
    .badge.bypass { background: #d2992226; color: #d29922; border: 1px solid #d2992266; }
    .violation-count {
      display: inline-block; font-size: 12px; padding: 2px 8px;
      border-radius: 12px; background: #21262d; color: #8b949e;
      cursor: pointer; user-select: none;
    }
    .violation-count:hover { background: #30363d; }
    .violation-detail {
      display: none; margin-top: 8px; padding: 8px 12px;
      background: #0d1117; border-radius: 6px;
      border-left: 3px solid #21262d;
      font-size: 13px; color: #8b949e;
    }
    .violation-detail.open { display: block; }
    .v-rule { color: #e6edf3; font-weight: 500; }
    .v-tag  { font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-right: 6px; }
    .v-tag.static { background: #388bfd26; color: #79c0ff; }
    .v-tag.llm    { background: #bc8cff26; color: #bc8cff; }
    .v-reason     { color: #8b949e; font-size: 12px; margin-top: 3px; }
    footer {
      text-align: center; padding: 32px 24px;
      color: #484f58; font-size: 13px;
    }
    footer a { color: #79c0ff; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>🛡️ Guardrails</h1>
    <span class="demo-badge">Demo</span>
  </header>
  <main>
    <div class="stats">
      <div class="stat-card">
        <div class="label">Total Commits</div>
        <div class="value" id="stat-total">8</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Violations</div>
        <div class="value red" id="stat-violations">3</div>
      </div>
      <div class="stat-card">
        <div class="label">Bypass Rate</div>
        <div class="value yellow" id="stat-bypass">12.5%</div>
      </div>
    </div>
    <table id="commits-table">
      <thead>
        <tr>
          <th>Commit</th>
          <th>Author</th>
          <th>Time</th>
          <th>Status</th>
          <th>Violations</th>
        </tr>
      </thead>
      <tbody id="commits-body"></tbody>
    </table>
  </main>
  <footer>
    <p>
      This is a demo with sample data.
      <a href="https://github.com/cedrova/guradrails">View on GitHub</a> ·
      Run <code>guardrails dashboard</code> to see your real data.
    </p>
  </footer>
  <script>
    const FIXTURE_COMMITS = [
      { hash: 'a1b2c3d4', author: 'alice@team.com', time: '2 hours ago',
        status: 'fail', violations: [
          { rule: 'no-console-log',      type: 'static', reason: null },
          { rule: 'Never hardcode secrets', type: 'llm', reason: 'API key hardcoded on line 12' }
        ]
      },
      { hash: 'e5f6a7b8', author: 'bob@team.com',   time: '4 hours ago',  status: 'pass',   violations: [] },
      { hash: 'c9d0e1f2', author: 'alice@team.com', time: '6 hours ago',  status: 'bypass', violations: [] },
      { hash: 'a3b4c5d6', author: 'carol@team.com', time: '8 hours ago',  status: 'pass',   violations: [] },
      { hash: 'e7f8a9b0', author: 'bob@team.com',   time: '1 day ago',    status: 'fail', violations: [
          { rule: 'no-todo-comments', type: 'static', reason: null }
        ]
      },
      { hash: 'c1d2e3f4', author: 'carol@team.com', time: '1 day ago',    status: 'pass',   violations: [] },
      { hash: 'a5b6c7d8', author: 'alice@team.com', time: '2 days ago',   status: 'pass',   violations: [] },
      { hash: 'e9f0a1b2', author: 'bob@team.com',   time: '2 days ago',   status: 'pass',   violations: [] },
    ];

    function renderRow(commit, idx) {
      const vcell = commit.violations.length > 0
        ? `<span class="violation-count" onclick="toggle(${idx})">${commit.violations.length} violation${commit.violations.length > 1 ? 's' : ''}</span>
           <div class="violation-detail" id="vd-${idx}">
             ${commit.violations.map(v =>
               `<div><span class="v-tag ${v.type}">${v.type}</span><span class="v-rule">${v.rule}</span>${
                 v.reason ? `<div class="v-reason">${v.reason}</div>` : ''}</div>`
             ).join('')}
           </div>`
        : `<span style="color:#484f58">—</span>`;
      return `<tr>
        <td><span class="hash">${commit.hash}</span></td>
        <td>${commit.author}</td>
        <td>${commit.time}</td>
        <td><span class="badge ${commit.status}">${commit.status}</span></td>
        <td>${vcell}</td>
      </tr>`;
    }

    function toggle(idx) {
      const el = document.getElementById('vd-' + idx);
      el.classList.toggle('open');
    }

    document.getElementById('commits-body').innerHTML =
      FIXTURE_COMMITS.map((c, i) => renderRow(c, i)).join('');
  </script>
</body>
</html>
